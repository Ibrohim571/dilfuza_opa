<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="container">
        <div class="card">
            <h2>Ro‘yxatdan o‘tish</h2>
            <input type="text" id="regUser" placeholder="Username">
            <input type="password" id="regPass" placeholder="Password">
            <button onclick="register()">Register</button>
            <p>Akkauntingiz bormi? <a href="login.html">Login</a></p>
            <p id="msg"></p>
        </div>
    </div>

    <script>
        function register() {
            let u = document.getElementById('regUser').value;
            let p = document.getElementById('regPass').value;

            if (u && p) {
                localStorage.setItem('user', u);
                localStorage.setItem('pass', p);
                document.getElementById('msg').innerText = "✅ Muvaffaqiyatli ro‘yxatdan o‘tildi";
            } else {
                document.getElementById('msg').innerText = "⚠️ Maydonlarni to‘ldiring";
            }
        }
    </script>

</body>

</html>
